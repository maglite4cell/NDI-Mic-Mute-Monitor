site_name: NDI Shure Monitor
site_description: Broadcast wireless mic mute statuses as an NDI video feed — supports Shure, Behringer X32, and WING.
site_url: https://maglite4cell.github.io/NDI-Mic-Mute-Monitor/
repo_name: maglite4cell/NDI-Mic-Mute-Monitor
repo_url: https://github.com/maglite4cell/NDI-Mic-Mute-Monitor
copyright: Copyright &copy; 2024 maglite4cell — MIT License

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Protocols: protocols.md
