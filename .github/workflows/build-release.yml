name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.9

    - name: Install NDI SDK (macOS)
      run: |
        curl -fsSL "https://downloads.ndi.tv/SDK/NDI_SDK_Mac/Install_NDI_SDK_v6_Apple.pkg" -o ndi_sdk.pkg || true
        if [ -f ndi_sdk.pkg ]; then
          sudo installer -pkg ndi_sdk.pkg -target /
        else
          echo "NDI SDK download failed – building without NDI (mock mode)"
        fi

    - name: Install Dependencies
      run: uv sync --all-extras

    - name: Build macOS App
      run: |
        uv run --with pyinstaller pyinstaller NDI_Shure_Monitor.spec

    - name: Ad-hoc Code Sign (bypass Gatekeeper "damaged" error)
      run: |
        codesign --deep --force --sign - "dist/NDI Shure Monitor.app"

    - name: Package macOS App
      run: |
        cd dist
        zip -r "NDI_Shure_Monitor_macOS.zip" "NDI Shure Monitor.app"

    - name: Upload Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NDI_Shure_Monitor_macOS
        path: dist/NDI_Shure_Monitor_macOS.zip

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/NDI_Shure_Monitor_macOS.zip
        generate_release_notes: true
        body: |
          ## NDI Shure Monitor

          ### macOS
          ✅ Full NDI video output, Shure receiver monitoring, and web dashboard.

          > **First launch:** macOS will show an "unidentified developer" warning because this build is not notarized with an Apple Developer certificate. To open it:
          > 1. Right-click (or Control-click) `NDI Shure Monitor.app` and select **Open**
          > 2. Click **Open** in the dialog that appears
          >
          > You only need to do this once. Alternatively, run in Terminal:
          > ```
          > xattr -cr "/Applications/NDI Shure Monitor.app"
          > ```

          ### Windows
          ⚠️ **NDI output is not yet available on Windows.** The Windows build is fully functional for Shure receiver monitoring and the web dashboard (http://localhost:8001), but will not broadcast an NDI video feed. A cross-platform NDI fix using a native ctypes wrapper is in progress and will be included in a future release.

          ---
          See [README](https://github.com/maglite4cell/NDI-Mic-Mute-Monitor#prerequisites) for setup instructions and NDI Runtime prerequisites.

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.9

    - name: Install NDI SDK (Windows)
      shell: pwsh
      run: |
        $url = "https://downloads.ndi.tv/SDK/NDI_SDK/NDI_SDK_v6_Windows.exe"
        $out = "ndi_sdk.exe"
        try {
          Invoke-WebRequest -Uri $url -OutFile $out -ErrorAction Stop
          Start-Process -FilePath $out -ArgumentList "/SILENT" -Wait
        } catch {
          Write-Host "NDI SDK download failed – building without NDI (mock mode)"
        }

    - name: Install Dependencies
      run: uv sync --all-extras

    - name: Build Windows Exe
      run: |
        uv run --with pyinstaller pyinstaller NDI_Shure_Monitor.spec

    - name: Zip EXE
      run: |
        Compress-Archive -Path "dist\NDI Shure Monitor\*" -DestinationPath "dist\NDI_Shure_Monitor_Windows.zip"

    - name: Upload Workflow Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NDI_Shure_Monitor_Windows
        path: dist/NDI_Shure_Monitor_Windows.zip

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/NDI_Shure_Monitor_Windows.zip

