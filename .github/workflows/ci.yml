name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.9

    - name: Install Dependencies
      run: uv sync --frozen

    - name: Run Pytest
      run: |
        export PYTHONPATH=.
        uv run pytest tests/
