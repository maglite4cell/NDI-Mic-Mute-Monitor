name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make the NDI Shure Monitor better? Share it here.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area of the app does this relate to?
      options:
        - NDI Output (new visual elements, overlays, layout)
        - Shure Protocol (new status types, receiver models)
        - Web Dashboard (new settings, UI improvements)
        - Channel Management (more channels, grouping)
        - Platform Support (Windows NDI, Linux)
        - Build / Distribution
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What workflow or problem is this feature trying to solve?
      placeholder: "In a live production environment, I need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like to see this implemented? Rough ideas are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried or alternative approaches you've thought of?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, screenshots, or links to similar tools for reference.
